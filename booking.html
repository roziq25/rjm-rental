<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - RJM Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .slide-up { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform: translateY(50px); opacity: 0; }
        @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 text-black font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-black text-white p-5 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <nav class="space-x-6 font-semibold hidden md:block">
                <a href="index.html" class="hover:text-gray-400 transition-colors">Home</a>
                <a href="armada.html" class="hover:text-gray-400 transition-colors">Armada Mobil</a>
                <a href="booking.html" class="border-b-2 border-white pb-1">Booking</a>
            </nav>
            <div class="text-2xl font-black tracking-widest flex items-center gap-2">
                <span class="bg-white text-black px-2 py-1 rounded">RJM</span> RENTAL
            </div>
        </div>
    </header>

    <main class="container mx-auto py-12 px-5 flex-grow flex justify-center items-center">
        <div class="bg-white p-8 md:p-12 border border-gray-300 shadow-2xl rounded-2xl w-full max-w-3xl slide-up">
            <h1 class="text-3xl font-extrabold mb-2 text-center">Formulir Pemesanan</h1>
            <p class="text-center text-gray-500 mb-8">Data mobil dan harga akan terisi otomatis dari pilihan Anda sebelumnya.</p>

            <form id="formBooking" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block font-bold mb-1">Nama Lengkap</label>
                        <input type="text" id="nama" required class="w-full border-2 border-gray-300 p-3 rounded focus:outline-none focus:border-black transition-colors" placeholder="Masukkan nama Anda">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">No. Telepon / WA</label>
                        <input type="number" id="telepon" required class="w-full border-2 border-gray-300 p-3 rounded focus:outline-none focus:border-black transition-colors" placeholder="Contoh: 08123456789">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">Mobil yang Dipilih</label>
                        <input type="text" id="mobil" readonly class="w-full border-2 border-gray-200 p-3 rounded bg-gray-100 font-semibold text-blue-800 outline-none" placeholder="Memuat...">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">Harga per Hari</label>
                        <input type="text" id="harga" readonly class="w-full border-2 border-gray-200 p-3 rounded bg-gray-100 font-semibold text-blue-800 outline-none" placeholder="Memuat...">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">Tanggal Sewa</label>
                        <input type="date" id="tanggal" required class="w-full border-2 border-gray-300 p-3 rounded focus:outline-none focus:border-black transition-colors">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">Durasi (Hari)</label>
                        <input type="number" id="durasi" min="1" required class="w-full border-2 border-gray-300 p-3 rounded focus:outline-none focus:border-black transition-colors" placeholder="Berapa hari?">
                    </div>
                    
                    <div>
                        <label class="block font-bold mb-1">Keperluan</label>
                        <select id="keperluan" required class="w-full border-2 border-gray-300 p-3 rounded focus:outline-none focus:border-black transition-colors bg-white">
                            <option value="" disabled selected>Pilih Keperluan</option>
                            <option value="Dinas / Instansi">Dinas / Instansi</option>
                            <option value="Pribadi / Keluarga">Pribadi / Keluarga</option>
                            <option value="Wisata">Wisata</option>
                            <option value="Wedding / Pernikahan">Wedding / Pernikahan</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>

                    <div>
                        <label class="block font-bold mb-1">Lokasi Pemakaian</label>
                        <select id="lokasi_pemakaian" required class="w-full border-2 border-gray-300 p-3 rounded focus:outline-none focus:border-black transition-colors bg-white">
                            <option value="" disabled selected>Pilih Lokasi Pemakaian</option>
                            <option value="Dalam Kota Banda Aceh">Dalam Kota Banda Aceh</option>
                            <option value="Aceh Besar & Sekitarnya">Aceh Besar & Sekitarnya</option>
                            <option value="Luar Kota / Lintas Kabupaten">Luar Kota / Lintas Kabupaten</option>
                        </select>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block font-bold mb-1">Lokasi Terima Unit</label>
                        <select id="lokasi_terima" required class="w-full border-2 border-gray-300 p-3 rounded focus:outline-none focus:border-black transition-colors bg-white">
                            <option value="" disabled selected>Pilih Lokasi Terima Unit</option>
                            <option value="Ambil Sendiri di Pool/Kantor RJM">Ambil Sendiri di Pool/Kantor RJM</option>
                            <option value="Antar ke Bandara SIM">Antar ke Bandara SIM</option>
                            <option value="Antar ke Hotel/Penginapan">Antar ke Hotel/Penginapan</option>
                            <option value="Antar ke Alamat Rumah/Pribadi">Antar ke Alamat Rumah/Pribadi</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block font-bold mb-1">Pesan Tambahan & Detail Alamat (Opsional)</label>
                    <textarea id="pesan" rows="3" class="w-full border-2 border-gray-300 p-3 rounded focus:outline-none focus:border-black transition-colors" placeholder="Masukkan detail nama hotel, alamat lengkap pengantaran, atau request khusus lainnya..."></textarea>
                </div>

                <button type="submit" class="w-full bg-black text-white font-bold py-4 rounded-lg hover:bg-gray-800 hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 text-lg uppercase tracking-wider">
                    Kirim via WhatsApp
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-black text-white text-center p-4 mt-auto">
        <p>&copy; 2026 RJM Rental. All rights reserved.</p>
    </footer>

    <script>
        // 1. FUNGSI MENGAMBIL DATA DARI URL (DARI FILE ARMADA)
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        };

        // Jalankan saat halaman dibuka
        window.onload = function() {
            const mobilDipilih = getUrlParameter('mobil');
            const hargaDipilih = getUrlParameter('harga');

            if (mobilDipilih) {
                document.getElementById('mobil').value = mobilDipilih;
            } else {
                document.getElementById('mobil').value = "Pilih mobil di menu Armada";
            }

            if (hargaDipilih) {
                document.getElementById('harga').value = "Rp " + hargaDipilih + " / Hari";
            }
        };

        // 2. LOGIKA PENGIRIMAN FORM KE WHATSAPP
        document.getElementById('formBooking').addEventListener('submit', function(event) {
            event.preventDefault();

            // Daftar 2 nomor WhatsApp Admin
            const daftar_nomor = ["6285314632547", "628972915282"];
            // Pilih nomor secara acak (rotasi)
            const nomor_wa = daftar_nomor[Math.floor(Math.random() * daftar_nomor.length)];

            // Ambil data input
            const nama = document.getElementById('nama').value;
            const telepon = document.getElementById('telepon').value;
            const mobil = document.getElementById('mobil').value;
            const harga = document.getElementById('harga').value;
            const tanggal = document.getElementById('tanggal').value;
            const durasi = document.getElementById('durasi').value;
            
            // Ambil data dari field baru
            const keperluan = document.getElementById('keperluan').value;
            const lokasi_pemakaian = document.getElementById('lokasi_pemakaian').value;
            const lokasi_terima = document.getElementById('lokasi_terima').value;
            
            const pesan = document.getElementById('pesan').value;

            // Susun pesan WhatsApp
            const teks_wa = `Halo RJM Rental, saya ingin memesan mobil dengan detail berikut:\n\n` +
                            `*Nama:* ${nama}\n` +
                            `*No. Telepon:* ${telepon}\n` +
                            `*Pilihan Mobil:* ${mobil}\n` +
                            `*Harga Sewa:* ${harga}\n` +
                            `*Tanggal Sewa:* ${tanggal}\n` +
                            `*Durasi:* ${durasi} Hari\n` +
                            `*Keperluan:* ${keperluan}\n` +
                            `*Lokasi Pemakaian:* ${lokasi_pemakaian}\n` +
                            `*Lokasi Terima Unit:* ${lokasi_terima}\n` +
                            `*Pesan Tambahan/Detail Alamat:* ${pesan ? pesan : '-'}\n\n` +
                            `Apakah armada tersedia?`;

            // Buka link WhatsApp
            const url_whatsapp = `https://api.whatsapp.com/send?phone=${nomor_wa}&text=${encodeURIComponent(teks_wa)}`;
            window.open(url_whatsapp, '_blank');
        });
    </script>
</body>
</html>
