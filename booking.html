<!DOCTYPE html>
<html lang="id">
<head>

<body class="bg-gray-50 text-black font-sans antialiased min-h-screen flex flex-col">

    <main class="container mx-auto py-12 px-5 flex-grow flex justify-center items-center">
        <div class="bg-white p-8 md:p-12 border border-gray-200 shadow-2xl rounded-2xl w-full max-w-3xl slide-up">
            <h1 class="text-3xl font-extrabold mb-2 text-center text-gray-900 uppercase">Formulir Pemesanan</h1>
            <p class="text-center text-gray-500 mb-8">Silakan lengkapi data di bawah ini untuk konfirmasi ketersediaan.</p>

            <form id="formBooking" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block font-bold mb-1 text-sm text-gray-700">Nama Lengkap</label>
                        <input type="text" id="nama" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-accent transition-all" placeholder="Masukkan nama Anda">
                    </div>
                    <div>
                        <label class="block font-bold mb-1 text-sm text-gray-700">No. Telepon / WA</label>
                        <input type="number" id="telepon" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-accent transition-all" placeholder="Contoh: 08123456789">
                    </div>
                    
                    <div>
                        <label class="block font-bold mb-1 text-sm text-gray-700">Mobil yang Dipilih</label>
                        <input type="text" id="mobil" readonly class="w-full border border-gray-200 p-3 rounded-xl bg-gray-50 font-semibold text-accent outline-none">
                    </div>
                    <div>
                        <label class="block font-bold mb-1 text-sm text-gray-700">Harga Estimasi</label>
                        <input type="text" id="harga" readonly class="w-full border border-gray-200 p-3 rounded-xl bg-gray-50 font-semibold text-accent outline-none">
                    </div>

                    <div>
                        <label class="block font-bold mb-1 text-sm text-gray-700">Tanggal Sewa</label>
                        <input type="date" id="tanggal" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-accent transition-all">
                    </div>
                    <div>
                        <label class="block font-bold mb-1 text-sm text-gray-700">Durasi (Hari)</label>
                        <input type="number" id="durasi" min="1" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-accent transition-all" placeholder="Contoh: 2">
                    </div>
                    
                    <div>
                        <label class="block font-bold mb-1 text-sm text-gray-700">Keperluan</label>
                        <select id="keperluan" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-accent bg-white">
                            <option value="" disabled selected>Pilih Keperluan</option>
                            <option value="Dinas / Instansi">Dinas / Instansi</option>
                            <option value="Pribadi / Keluarga">Pribadi / Keluarga</option>
                            <option value="Wisata">Wisata</option>
                            <option value="Wedding / Pernikahan">Wedding / Pernikahan</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-bold mb-1 text-sm text-gray-700">Lokasi Pemakaian</label>
                        <select id="lokasi_pemakaian" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-accent bg-white">
                            <option value="" disabled selected>Pilih Lokasi Pemakaian</option>
                            <option value="Dalam Kota Banda Aceh">Dalam Kota Banda Aceh</option>
                            <option value="Aceh Besar & Sekitarnya">Aceh Besar & Sekitarnya</option>
                            <option value="Luar Kota / Lintas Kabupaten">Luar Kota / Lintas Kabupaten</option>
                        </select>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block font-bold mb-1 text-sm text-gray-700">Lokasi Terima Unit</label>
                        <select id="lokasi_terima" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-accent bg-white">
                            <option value="" disabled selected>Pilih Lokasi Terima Unit</option>
                            <option value="Ambil Sendiri di Pool/Kantor RJM">Ambil Sendiri di Pool/Kantor RJM</option>
                            <option value="Antar ke Bandara SIM">Antar ke Bandara SIM</option>
                            <option value="Antar ke Hotel/Penginapan">Antar ke Hotel/Penginapan</option>
                            <option value="Antar ke Alamat Rumah/Pribadi">Antar ke Alamat Rumah/Pribadi</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block font-bold mb-1 text-sm text-gray-700">Pesan Tambahan (Opsional)</label>
                    <textarea id="pesan" rows="3" class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-accent" placeholder="Contoh: Nama hotel atau request khusus..."></textarea>
                </div>

                <div class="pt-4">
                    <p class="text-center font-bold text-gray-700 mb-4 uppercase text-xs tracking-widest">Kirim Pesanan Ke:</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <button type="button" onclick="sendWhatsApp('6285314632547')" class="bg-[#25D366] text-white font-bold py-4 rounded-xl hover:bg-[#128C7E] shadow-md transition-all flex justify-center items-center gap-2">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                            Mirza
                        </button>
                        <button type="button" onclick="sendWhatsApp('628972915282')" class="bg-[#25D366] text-white font-bold py-4 rounded-xl hover:bg-[#128C7E] shadow-md transition-all flex justify-center items-center gap-2">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                            Roziq
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-black text-gray-400 p-6 sm:p-8 mt-auto border-t border-gray-900">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center text-center sm:text-left gap-4">
            <p>© 2026 <span class="text-accent font-semibold">RJM Rentcar</span>. Hak Cipta Dilindungi.</p>
            <p class="text-sm italic">Layanan Sewa Mobil Tepercaya di Banda Aceh.</p>
        </div>
    </footer>

    <script>
        // Hamburger Menu Logic
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const overlay = document.getElementById('mobile-menu-overlay');

        function toggleMenu() {
            mobileMenu.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
            setTimeout(() => overlay.classList.toggle('opacity-0'), 10);
        }

        mobileMenuBtn.addEventListener('click', toggleMenu);
        closeMenuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        // URL Parameters Loader
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        };

        window.onload = function() {
            const mobilDipilih = getUrlParameter('mobil');
            const hargaDipilih = getUrlParameter('harga');
            document.getElementById('mobil').value = mobilDipilih || "Pilih mobil di menu Armada";
            if (hargaDipilih) document.getElementById('harga').value = "Rp " + hargaDipilih + " / Hari";
        };

        // WhatsApp Sender Logic
        function sendWhatsApp(phoneNumber) {
            const form = document.getElementById('formBooking');
            
            // Validasi manual sebelum kirim
            if(!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const data = {
                nama: document.getElementById('nama').value,
                telepon: document.getElementById('telepon').value,
                mobil: document.getElementById('mobil').value,
                harga: document.getElementById('harga').value,
                tanggal: document.getElementById('tanggal').value,
                durasi: document.getElementById('durasi').value,
                keperluan: document.getElementById('keperluan').value,
                lokasi_pemakaian: document.getElementById('lokasi_pemakaian').value,
                lokasi_terima: document.getElementById('lokasi_terima').value,
                pesan: document.getElementById('pesan').value || '-'
            };

            const text = `Halo RJM Rentcar, saya ingin memesan mobil:\n\n` +
                         `*Nama:* ${data.nama}\n` +
                         `*WA:* ${data.telepon}\n` +
                         `*Mobil:* ${data.mobil}\n` +
                         `*Harga:* ${data.harga}\n` +
                         `*Tgl Sewa:* ${data.tanggal}\n` +
                         `*Durasi:* ${data.durasi} Hari\n` +
                         `*Keperluan:* ${data.keperluan}\n` +
                         `*Lokasi Pakai:* ${data.lokasi_pemakaian}\n` +
                         `*Lokasi Terima:* ${data.lokasi_terima}\n` +
                         `*Pesan:* ${data.pesan}\n\n` +
                         `Apakah armada tersedia?`;

            window.open(`https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
